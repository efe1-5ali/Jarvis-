<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blok Macera</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1025">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#1a1025; font-family:'Trebuchet MS', Arial, sans-serif; touch-action:none; }
  #game { display:block; width:100%; height:100%; background:linear-gradient(#87CEEB,#c9e8f5); }

  #hud {
    position:fixed; top:0; left:0; right:0; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; z-index:10;
  }
  .pill {
    background:rgba(20,10,35,0.55); backdrop-filter:blur(4px);
    border:2px solid rgba(255,255,255,0.25); border-radius:14px;
    padding:8px 14px; color:#fff; font-weight:bold; font-size:15px;
    display:flex; align-items:center; gap:8px;
  }
  .coin-dot { width:14px;height:14px;border-radius:50%;background:#ffd23f;border:2px solid #b8860b; }
  .heart { color:#ff5d5d; font-size:16px; }

  #joystick-zone {
    position:fixed; left:0; bottom:0; width:45%; height:45%;
    z-index:10;
  }
  #stick-base {
    position:absolute; left:40px; bottom:40px; width:110px; height:110px; border-radius:50%;
    background:rgba(255,255,255,0.18); border:3px solid rgba(255,255,255,0.45);
    display:block;
  }
  #stick-knob {
    position:absolute; width:50px; height:50px; border-radius:50%;
    background:rgba(255,255,255,0.6); border:3px solid rgba(255,255,255,0.85);
    left:30px; top:30px;
  }
  #rotate-screen {
    position:fixed; inset:0; z-index:40; background:#1a1025;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; text-align:center; padding:20px;
  }
  #rotate-screen .icon { font-size:60px; margin-bottom:16px; animation:spin 1.6s ease-in-out infinite; }
  @keyframes spin { 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(90deg);} }
  @media (orientation: portrait) {
    #rotate-screen { display:flex; }
    #start-screen, #game, #hud, #joystick-zone, #jump-btn, #msg { display:none !important; }
  }

  #jump-btn {
    position:fixed; right:24px; bottom:36px; width:88px; height:88px;
    border-radius:50%; background:radial-gradient(circle at 35% 30%, #ffcf5c, #d98a1f);
    border:4px solid #a65e0f; box-shadow:0 6px 0 #7a4409, 0 8px 14px rgba(0,0,0,0.4);
    color:#4a2a05; font-weight:bold; font-size:14px; z-index:10;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  #jump-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #7a4409; }

  #msg {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(20,10,35,0.85); color:#fff; padding:24px 32px; border-radius:16px;
    text-align:center; z-index:20; border:3px solid #ffd23f; display:none;
  }
  #msg h2 { color:#ffd23f; margin-bottom:8px; font-size:22px; }
  #msg p { margin-bottom:14px; opacity:0.85; font-size:14px; }
  #msg button {
    background:#ffd23f; border:none; padding:10px 22px; border-radius:10px;
    font-weight:bold; font-size:15px; color:#4a2a05;
  }

  #start-screen {
    position:fixed; inset:0; z-index:30; background:linear-gradient(#3a1f5c,#1a1025);
    display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff;
  }
  #start-screen h1 { font-size:34px; color:#ffd23f; text-shadow:3px 3px 0 #a65e0f; margin-bottom:6px; }
  #start-screen p { opacity:0.7; margin-bottom:24px; font-size:14px; text-align:center; padding:0 30px; }
  #start-btn {
    background:linear-gradient(#7ed957,#4caf3a); border:4px solid #2e7d1f;
    padding:16px 40px; border-radius:14px; font-size:18px; font-weight:bold;
    color:#0d3a05; box-shadow:0 6px 0 #1f5c14;
  }
  #start-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #1f5c14; }

  #level-select {
    position:fixed; inset:0; z-index:30; background:linear-gradient(#3a1f5c,#1a1025);
    display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff;
    padding:20px;
  }
  #level-select h1 { font-size:26px; color:#ffd23f; text-shadow:2px 2px 0 #a65e0f; margin-bottom:18px; }
  #level-grid {
    display:grid; grid-template-columns:repeat(4, 1fr); gap:14px;
    max-width:520px; width:100%;
  }
  .level-btn {
    aspect-ratio:1; border-radius:14px; border:3px solid #ffd23f;
    background:linear-gradient(#7ed957,#4caf3a); color:#0d3a05;
    font-size:22px; font-weight:bold; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px;
    box-shadow:0 5px 0 #1f5c14;
  }
  .level-btn:active { transform:translateY(3px); box-shadow:0 2px 0 #1f5c14; }
  .level-btn.locked {
    background:linear-gradient(#6b6b7a,#454550); border-color:#8a8a99; color:#c8c8d0;
    box-shadow:0 5px 0 #2a2a33;
  }
  .level-btn .stars { font-size:12px; }

  #pause-btn {
    position:fixed; top:14px; right:14px; z-index:11;
    width:38px; height:38px; border-radius:50%;
    background:rgba(20,10,35,0.55); border:2px solid rgba(255,255,255,0.25);
    color:#fff; font-size:16px; display:none;
  }
</style>
</head>
<body>

<div id="rotate-screen">
  <div class="icon">📱</div>
  <p>Bu oyun yatay modda oynanır.<br>Telefonunu çevir!</p>
</div>

<div id="start-screen">
  <h1>🐻 BLOK MACERA</h1>
  <p>Bloklu dünyada koş, zıpla, canavarlardan kaç, altınları topla!<br>Sol taraf: hareket joystick&apos;i • Sağ alt: zıpla butonu</p>
  <button id="start-btn">BÖLÜM SEÇ</button>
</div>

<div id="level-select">
  <h1>🗺️ BÖLÜM SEÇ</h1>
  <div id="level-grid"></div>
</div>

<button id="pause-btn">☰</button>

<canvas id="game"></canvas>

<div id="hud">
  <div class="pill"><span id="level-label">Bölüm 1</span></div>
  <div class="pill"><span class="coin-dot"></span><span id="coin-count">0</span></div>
  <div class="pill"><span class="heart">❤️</span><span id="life-count">3</span></div>
</div>

<div id="joystick-zone">
  <div id="stick-base"><div id="stick-knob"></div></div>
</div>
<div id="jump-btn">ZIPLA</div>

<div id="msg">
  <h2 id="msg-title"></h2>
  <p id="msg-text"></p>
  <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
    <button id="msg-btn">Tekrar Başla</button>
    <button id="msg-next-btn" style="display:none; background:#6bc6ff; color:#0a2e4a;">Sonraki Bölüm ▶</button>
    <button id="msg-menu-btn" style="background:#c8c8d0; color:#2a2a33;">Bölüm Seç</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

// ---------- Sabitler ----------
const TILE = 40;
const GRAVITY = 0.9;
const MOVE_SPEED = 4.2;
const JUMP_FORCE = -16;

// Blok tipleri: 0 boş, 1 çim, 2 toprak, 3 taş, 4 altın bloğu(görsel), 5 tehlike(lav)
const COLORS = {
  1: { top:'#5fd15a', side:'#8a5a2e' },
  2: { top:'#8a5a2e', side:'#6b4423' },
  3: { top:'#9a9a9a', side:'#6f6f6f' },
  5: { top:'#ff5522', side:'#c23c10' }
};

// ---------- Bölümler ----------
const LEVELS = [
  { name:'Çayır Başlangıcı', length:45, seed:101, hazardRate:0.965, pitRate:0.93, monsterRate:0.09, monsterSpeed:1.2 },
  { name:'Taşlı Yamaç',      length:55, seed:202, hazardRate:0.955, pitRate:0.91, monsterRate:0.11, monsterSpeed:1.5 },
  { name:'Uçurum Geçidi',    length:65, seed:303, hazardRate:0.94,  pitRate:0.88, monsterRate:0.13, monsterSpeed:1.8 },
  { name:'Kayıp Vadi',       length:75, seed:404, hazardRate:0.93,  pitRate:0.87, monsterRate:0.15, monsterSpeed:2.1 },
  { name:'Alev Geçidi',      length:85, seed:505, hazardRate:0.92,  pitRate:0.86, monsterRate:0.17, monsterSpeed:2.4 },
  { name:'Zirve Meydan Okuması', length:100, seed:606, hazardRate:0.91, pitRate:0.85, monsterRate:0.19, monsterSpeed:2.7 },
];

let currentLevelIndex = 0;
let currentLevel = LEVELS[0];

function getProgress(){
  try {
    const raw = localStorage.getItem('blokmacera-progress');
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return { unlocked: 1, stars: {} };
}
function saveProgress(p){
  try { localStorage.setItem('blokmacera-progress', JSON.stringify(p)); } catch(e){}
}
let progress = getProgress();

// ---------- Dünya üretimi (bölüm bazlı, sonlu) ----------
let world = {};
let columns = [];
let seedRand = Math.random()*1000;

function pseudo(x){
  const s = Math.sin(x*0.15 + seedRand)*43758.5453;
  return s - Math.floor(s);
}

function genColumn(cx){
  const lv = currentLevel;
  const base = 8;
  const wobble = Math.floor(Math.sin(cx*0.08)*2.2 + Math.sin(cx*0.23)*1.3);
  let groundY = base + wobble;

  const isFinish = cx === lv.length;
  const isEdge = cx <= 1 || cx >= lv.length + 3; // start/end safe zones + beyond level
  let isPit = !isEdge && !isFinish && pseudo(cx*3.1) > lv.pitRate && cx > 6;
  if (isPit) groundY = 999;

  let hasHazard = !isEdge && !isFinish && !isPit && pseudo(cx*7.7) > lv.hazardRate && cx > 10;
  let hasCoin = !isEdge && pseudo(cx*5.3) > 0.72;
  let floatBlock = !isEdge && pseudo(cx*9.1) > 0.85 && cx > 5;
  let hasMonster = !isEdge && !isFinish && !isPit && !hasHazard && pseudo(cx*13.7) > (1-lv.monsterRate) && cx > 8 && cx < lv.length - 2;

  return {
    cx, groundY, isPit, hasHazard, isFinish,
    coinY: hasCoin ? groundY - (2 + Math.floor(pseudo(cx*11)*3)) : null,
    floatY: floatBlock ? groundY - 4 - Math.floor(pseudo(cx*13)*2) : null,
    hasMonster
  };
}

function getColumn(cx){
  if (!columns[cx]) columns[cx] = genColumn(cx);
  return columns[cx];
}

// ---------- Canavarlar ----------
let monsters = [];
const MONSTER_W = 26, MONSTER_H = 22;

function spawnMonstersForLevel(){
  monsters = [];
  for (let cx=0; cx<=currentLevel.length; cx++){
    const col = getColumn(cx);
    if (col.hasMonster){
      const groundPixelY = col.groundY*TILE;
      monsters.push({
        x: cx*TILE, y: groundPixelY - MONSTER_H,
        w: MONSTER_W, h: MONSTER_H,
        vx: currentLevel.monsterSpeed * (pseudo(cx*17)>0.5?1:-1),
        minX: (cx-1)*TILE, maxX: (cx+1)*TILE,
        alive: true, squishT: 0
      });
    }
  }
}

function updateMonsters(){
  for (const m of monsters){
    if (!m.alive){
      if (m.squishT > 0) m.squishT -= 1;
      continue;
    }
    m.x += m.vx;
    if (m.x < m.minX || m.x > m.maxX) m.vx *= -1;
    // canavar bir zemin/pit sınırından düşmesin
    const feetCx = Math.floor((m.x + m.w/2)/TILE);
    const col = getColumn(feetCx);
    if (col.isPit || col.hasHazard){ m.vx *= -1; m.x += m.vx*2; }

    // oyuncu ile çarpışma
    if (player.alive !== false && rectsOverlap(player.x,player.y,player.w,player.h, m.x,m.y,m.w,m.h)){
      const playerBottom = player.y + player.h;
      const fallingOnTop = player.vy > 0 && playerBottom - m.y < 14;
      if (fallingOnTop){
        // canavarı ez
        m.alive = false;
        m.squishT = 18;
        player.vy = JUMP_FORCE * 0.55; // hafif zıplama
      } else {
        loseLife();
      }
    }
  }
}

function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh){
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function drawMonster(m){
  const sx = m.x - camX, sy = m.y - camY;
  if (sx < -60 || sx > canvas.width+60) return;
  ctx.save();
  let cxp = sx + m.w/2, cyp = sy + m.h/2, sqx = 1, sqy = 1;
  if (!m.alive){
    const t = Math.max(0, m.squishT/18);
    sqx = 1 + (1-t)*0.4;
    sqy = 0.2 + t*0.8;
    cyp = sy + m.h - (m.h*sqy)/2;
  }
  ctx.fillStyle = '#8a3ab0';
  ctx.beginPath();
  ctx.ellipse(cxp, cyp, (m.w/2)*sqx, (m.h/2)*sqy, 0, 0, Math.PI*2);
  ctx.fill();
  if (m.alive){
    // gözler
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cxp-6, cyp-3, 3.5, 0, Math.PI*2);
    ctx.arc(cxp+6, cyp-3, 3.5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1a0a25';
    const dir = m.vx>0?1.5:-1.5;
    ctx.beginPath();
    ctx.arc(cxp-6+dir, cyp-3, 1.6, 0, Math.PI*2);
    ctx.arc(cxp+6+dir, cyp-3, 1.6, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}


let player = {
  x: 100, y: 0, vx:0, vy:0, w:26, h:34, onGround:false, facing:1, alive:true,
  fallStartTime: null
};
let camX = 0;
let camY = 0;
let coins = 0;
let lives = 3;
let collectedCoins = new Set();
let gameRunning = false;

function resetPlayer(){
  const startCol = getColumn(2);
  player.x = 2*TILE + 10;
  player.y = (startCol.groundY - 4) * TILE;
  player.vx = 0; player.vy = 0;
  player.fallStartTime = null;
  camX = 0;
  camY = player.y - canvas.height*0.55;
}

// ---------- Input ----------
let keys = { left:false, right:false, jump:false };

const zone = document.getElementById('joystick-zone');
const base = document.getElementById('stick-base');
const knob = document.getElementById('stick-knob');
let stickActive = false, stickId = null, baseX=0, baseY=0;

function updateBaseCenter(){
  const r = base.getBoundingClientRect();
  baseX = r.left + r.width/2;
  baseY = r.top + r.height/2;
}
updateBaseCenter();
window.addEventListener('resize', updateBaseCenter);

function stickStart(id, cx, cy){
  stickActive = true; stickId = id;
  updateBaseCenter();
  knob.style.left='30px'; knob.style.top='30px';
}
function stickMove(cx, cy){
  if (!stickActive) return;
  let dx = cx-baseX, dy = cy-baseY;
  const max = 45;
  const dist = Math.min(Math.hypot(dx,dy), max);
  const ang = Math.atan2(dy,dx);
  const kx = Math.cos(ang)*dist, ky = Math.sin(ang)*dist;
  knob.style.left = (30+kx)+'px'; knob.style.top = (30+ky)+'px';
  keys.left = dx < -15;
  keys.right = dx > 15;
}
function stickEnd(){
  stickActive = false; stickId = null;
  knob.style.left='30px'; knob.style.top='30px';
  keys.left=false; keys.right=false;
}

zone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  stickStart(t.identifier, t.clientX, t.clientY);
}, {passive:false});
zone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for (const t of e.changedTouches) if (t.identifier===stickId) stickMove(t.clientX,t.clientY);
}, {passive:false});
zone.addEventListener('touchend', e=>{
  e.preventDefault();
  for (const t of e.changedTouches) if (t.identifier===stickId) stickEnd();
}, {passive:false});

// mouse fallback for desktop testing
zone.addEventListener('mousedown', e=>{ stickStart('m', e.clientX, e.clientY); });
window.addEventListener('mousemove', e=>{ if(stickId==='m') stickMove(e.clientX,e.clientY); });
window.addEventListener('mouseup', e=>{ if(stickId==='m') stickEnd(); });

const jumpBtn = document.getElementById('jump-btn');
function doJump(){ keys.jump = true; }
jumpBtn.addEventListener('touchstart', e=>{ e.preventDefault(); doJump(); }, {passive:false});
jumpBtn.addEventListener('mousedown', e=>{ doJump(); });

// keyboard fallback
window.addEventListener('keydown', e=>{
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=true;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=true;
  if (e.key===' '||e.key==='ArrowUp'||e.key==='w') keys.jump=true;
});
window.addEventListener('keyup', e=>{
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
});

// ---------- Collision helpers ----------
function isSolidAt(px, py){
  const cx = Math.floor(px / TILE);
  const col = getColumn(cx);
  const tileY = Math.floor(py / TILE);
  if (col.isPit) {
    if (col.floatY !== null && tileY === col.floatY) return 'block';
    return null;
  }
  if (tileY >= col.groundY) return 'ground';
  if (col.floatY !== null && tileY === col.floatY) return 'block';
  return null;
}
function isHazardAt(px, py){
  const cx = Math.floor(px/TILE);
  const col = getColumn(cx);
  if (col.hasHazard && !col.isPit){
    const tileY = Math.floor(py/TILE);
    if (tileY === col.groundY) return true;
  }
  return false;
}

// ---------- Oyun döngüsü ----------
function update(){
  if (!gameRunning) return;

  // yatay hareket
  if (keys.left){ player.vx = -MOVE_SPEED; player.facing=-1; }
  else if (keys.right){ player.vx = MOVE_SPEED; player.facing=1; }
  else player.vx *= 0.7;

  if (keys.jump && player.onGround){
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }
  keys.jump = false;

  player.vy += GRAVITY;
  if (player.vy > 20) player.vy = 20;

  // X hareketi + collision
  let nx = player.x + player.vx;
  const feetY = player.y + player.h - 2;
  const midY = player.y + player.h/2;
  const checkX = player.vx > 0 ? nx + player.w : nx;
  if (!isSolidAt(checkX, feetY) && !isSolidAt(checkX, midY)){
    player.x = nx;
  }

  // Y hareketi + collision
  let ny = player.y + player.vy;
  player.onGround = false;
  if (player.vy > 0){
    const checkFeet = ny + player.h;
    const solid = isSolidAt(player.x + player.w/2, checkFeet);
    if (solid){
      const cx = Math.floor((player.x+player.w/2)/TILE);
      const col = getColumn(cx);
      let landY;
      if (solid==='ground') landY = col.groundY*TILE;
      else landY = col.floatY*TILE;
      player.y = landY - player.h;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.y = ny;
    }
  } else if (player.vy < 0){
    const checkHead = ny;
    const solid = isSolidAt(player.x + player.w/2, checkHead);
    if (solid){
      player.vy = 0;
    } else {
      player.y = ny;
    }
  }

  // düşme (pit) -> 2 saniye içinde can kaybı
  const feetCol = getColumn(Math.floor((player.x+player.w/2)/TILE));
  const isFalling = feetCol.isPit && player.y > camY + canvas.height*0.3;
  if (isFalling){
    if (player.fallStartTime === null) player.fallStartTime = Date.now();
    else if (Date.now() - player.fallStartTime >= 2000){
      player.fallStartTime = null;
      loseLife();
    }
  } else {
    player.fallStartTime = null;
  }
  // güvenlik ağı: çok derine düşerse yine de öldür
  if (player.y > camY + canvas.height + 600){
    player.fallStartTime = null;
    loseLife();
  }

  // hazard check
  if (isHazardAt(player.x+player.w/2, player.y+player.h-2)){
    loseLife();
  }

  // coin toplama
  const cx = Math.floor((player.x+player.w/2)/TILE);
  const col = getColumn(cx);
  if (col.coinY !== null && !collectedCoins.has(cx)){
    const coinPixelY = col.coinY*TILE;
    if (Math.abs((player.y+player.h/2) - (coinPixelY+TILE/2)) < TILE && player.x+player.w > cx*TILE && player.x < cx*TILE+TILE){
      collectedCoins.add(cx);
      coins++;
      document.getElementById('coin-count').textContent = coins;
    }
  }

  camX = player.x - canvas.width*0.35;
  if (camX < 0) camX = 0;

  // dikey kamera: zemini her zaman ekranın alt kısmına yakın tut
  const targetCamY = player.y - canvas.height*0.55;
  camY += (targetCamY - camY) * 0.15;

  updateMonsters();

  // bölüm bitişi kontrolü
  const playerCol = Math.floor((player.x+player.w/2)/TILE);
  if (playerCol >= currentLevel.length && gameRunning){
    completeLevel();
    return;
  }

  draw();
  requestAnimationFrame(update);
}

function completeLevel(){
  gameRunning = false;
  const stars = lives >= 3 ? 3 : (lives === 2 ? 2 : 1);
  progress.stars[currentLevelIndex] = Math.max(progress.stars[currentLevelIndex]||0, stars);
  if (currentLevelIndex + 1 >= progress.unlocked && currentLevelIndex + 1 < LEVELS.length){
    progress.unlocked = currentLevelIndex + 2;
  }
  saveProgress(progress);
  endGame(true, stars);
}

function loseLife(){
  lives--;
  document.getElementById('life-count').textContent = lives;
  if (lives <= 0){
    endGame(false);
  } else {
    for (const m of monsters){ m.alive = true; m.squishT = 0; m.x = m.minX + TILE; }
    resetPlayer();
  }
}

function endGame(win, stars){
  gameRunning = false;
  const msg = document.getElementById('msg');
  const nextBtn = document.getElementById('msg-next-btn');
  const menuBtn = document.getElementById('msg-menu-btn');
  document.getElementById('msg-title').textContent = win ? '🎉 Bölüm Tamamlandı!' : '💀 Oyun Bitti';
  document.getElementById('msg-text').textContent = win
    ? `${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}  •  ${coins} altın topladın!`
    : `${coins} altın toplayabildin. Tekrar dene!`;
  document.getElementById('msg-btn').textContent = win ? 'Tekrar Oyna' : 'Tekrar Dene';
  nextBtn.style.display = (win && currentLevelIndex+1 < LEVELS.length) ? 'inline-block' : 'none';
  msg.style.display = 'block';
}

// ---------- Çizim ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // uzak dağlar (paralaks)
  ctx.fillStyle = 'rgba(120,90,160,0.35)';
  for (let i=-2;i<20;i++){
    const bx = i*220 - (camX*0.3)%220;
    ctx.beginPath();
    ctx.moveTo(bx, canvas.height*0.55);
    ctx.lineTo(bx+110, canvas.height*0.3);
    ctx.lineTo(bx+220, canvas.height*0.55);
    ctx.fill();
  }

  const startCol = Math.floor(camX/TILE) - 1;
  const endCol = startCol + Math.ceil(canvas.width/TILE) + 3;

  for (let cx=startCol; cx<=endCol; cx++){
    if (cx < 0) continue;
    const col = getColumn(cx);
    const sx = cx*TILE - camX;

    if (!col.isPit){
      // zemin blokları (birkaç kat aşağı görünsün)
      for (let ty=col.groundY; ty<col.groundY+8; ty++){
        const sy = ty*TILE - camY;
        if (sy > canvas.height+40) break;
        if (sy < -TILE) continue;
        drawBlock(sx, sy, ty===col.groundY ? 1 : 2);
      }
      if (col.hasHazard){
        // lav görünümü üstte parlasın
        ctx.fillStyle = '#ff7733';
        ctx.fillRect(sx, col.groundY*TILE-4-camY, TILE, 6);
      }
    }

    if (col.floatY !== null){
      drawBlock(sx, col.floatY*TILE - camY, 3);
    }

    if (col.coinY !== null && !collectedCoins.has(cx)){
      drawCoin(sx+TILE/2, col.coinY*TILE+TILE/2 - camY);
    }
  }

  // oyuncu (ayı)
  drawBear(player.x - camX, player.y - camY, player.facing);
}

function drawBlock(sx, sy, type){
  const c = COLORS[type];
  ctx.fillStyle = c.top;
  ctx.fillRect(sx, sy, TILE, TILE*0.28);
  ctx.fillStyle = c.side;
  ctx.fillRect(sx, sy+TILE*0.28, TILE, TILE*0.72);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(sx, sy, TILE, TILE);
}

function drawCoin(cx, cy){
  const t = Date.now()/300;
  const scaleX = Math.abs(Math.cos(t));
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scaleX, 1);
  ctx.beginPath();
  ctx.arc(0,0,11,0,Math.PI*2);
  ctx.fillStyle = '#ffd23f';
  ctx.fill();
  ctx.strokeStyle = '#b8860b';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function drawBear(x, y, facing){
  ctx.save();
  ctx.translate(x + player.w/2, y + player.h/2);
  ctx.scale(facing, 1);
  // gövde
  ctx.fillStyle = '#8B5A2B';
  ctx.beginPath();
  ctx.ellipse(0, 4, 13, 15, 0, 0, Math.PI*2);
  ctx.fill();
  // kafa
  ctx.beginPath();
  ctx.arc(6, -14, 10, 0, Math.PI*2);
  ctx.fill();
  // kulaklar
  ctx.beginPath();
  ctx.arc(0,-22,4,0,Math.PI*2);
  ctx.arc(12,-22,4,0,Math.PI*2);
  ctx.fill();
  // yüz (açık kısım)
  ctx.fillStyle = '#c98a4b';
  ctx.beginPath();
  ctx.arc(9,-11,5,0,Math.PI*2);
  ctx.fill();
  // göz
  ctx.fillStyle = '#2a1808';
  ctx.beginPath();
  ctx.arc(11,-15,1.6,0,Math.PI*2);
  ctx.fill();
  // burun
  ctx.beginPath();
  ctx.arc(12,-9,2,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

  document.getElementById('life-count').textContent = lives;

  resetPlayer();
  gameRunning = true;
  requestAnimationFrame(update);
}
