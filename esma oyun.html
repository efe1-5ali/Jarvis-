<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blok Macera</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#1a1025; font-family:'Trebuchet MS', Arial, sans-serif; touch-action:none; }
  #game { display:block; width:100%; height:100%; background:linear-gradient(#87CEEB,#c9e8f5); }

  #hud {
    position:fixed; top:0; left:0; right:0; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; z-index:10;
  }
  .pill {
    background:rgba(20,10,35,0.55); backdrop-filter:blur(4px);
    border:2px solid rgba(255,255,255,0.25); border-radius:14px;
    padding:8px 14px; color:#fff; font-weight:bold; font-size:15px;
    display:flex; align-items:center; gap:8px;
  }
  .coin-dot { width:14px;height:14px;border-radius:50%;background:#ffd23f;border:2px solid #b8860b; }
  .heart { color:#ff5d5d; font-size:16px; }

  #joystick-zone {
    position:fixed; left:0; bottom:0; width:45%; height:45%;
    z-index:10;
  }
  #stick-base {
    position:absolute; left:40px; bottom:40px; width:110px; height:110px; border-radius:50%;
    background:rgba(255,255,255,0.18); border:3px solid rgba(255,255,255,0.45);
    display:block;
  }
  #stick-knob {
    position:absolute; width:50px; height:50px; border-radius:50%;
    background:rgba(255,255,255,0.6); border:3px solid rgba(255,255,255,0.85);
    left:30px; top:30px;
  }
  #rotate-screen {
    position:fixed; inset:0; z-index:40; background:#1a1025;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; text-align:center; padding:20px;
  }
  #rotate-screen .icon { font-size:60px; margin-bottom:16px; animation:spin 1.6s ease-in-out infinite; }
  @keyframes spin { 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(90deg);} }
  @media (orientation: portrait) {
    #rotate-screen { display:flex; }
    #start-screen, #game, #hud, #joystick-zone, #jump-btn, #msg { display:none !important; }
  }

  #jump-btn {
    position:fixed; right:24px; bottom:36px; width:88px; height:88px;
    border-radius:50%; background:radial-gradient(circle at 35% 30%, #ffcf5c, #d98a1f);
    border:4px solid #a65e0f; box-shadow:0 6px 0 #7a4409, 0 8px 14px rgba(0,0,0,0.4);
    color:#4a2a05; font-weight:bold; font-size:14px; z-index:10;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  #jump-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #7a4409; }

  #msg {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(20,10,35,0.85); color:#fff; padding:24px 32px; border-radius:16px;
    text-align:center; z-index:20; border:3px solid #ffd23f; display:none;
  }
  #msg h2 { color:#ffd23f; margin-bottom:8px; font-size:22px; }
  #msg p { margin-bottom:14px; opacity:0.85; font-size:14px; }
  #msg button {
    background:#ffd23f; border:none; padding:10px 22px; border-radius:10px;
    font-weight:bold; font-size:15px; color:#4a2a05;
  }

  #start-screen {
    position:fixed; inset:0; z-index:30; background:linear-gradient(#3a1f5c,#1a1025);
    display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff;
  }
  #start-screen h1 { font-size:34px; color:#ffd23f; text-shadow:3px 3px 0 #a65e0f; margin-bottom:6px; }
  #start-screen p { opacity:0.7; margin-bottom:24px; font-size:14px; text-align:center; padding:0 30px; }
  #start-btn {
    background:linear-gradient(#7ed957,#4caf3a); border:4px solid #2e7d1f;
    padding:16px 40px; border-radius:14px; font-size:18px; font-weight:bold;
    color:#0d3a05; box-shadow:0 6px 0 #1f5c14;
  }
  #start-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #1f5c14; }
  #level-select-btn {
    margin-top:14px; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.4);
    color:#fff; padding:10px 26px; border-radius:10px; font-weight:bold; font-size:14px;
  }

  /* ---- Bölüm Seç Ekranı ---- */
  #level-select {
    position:fixed; inset:0; z-index:30; background:linear-gradient(#3a1f5c,#1a1025);
    display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff;
    padding:20px;
  }
  #level-select h1 { font-size:26px; color:#ffd23f; text-shadow:3px 3px 0 #a65e0f; margin-bottom:18px; }
  #level-grid {
    display:grid; grid-template-columns:repeat(5, 1fr); gap:14px;
    max-width:640px; width:100%;
  }
  .level-card {
    position:relative; background:rgba(255,255,255,0.08); border:3px solid rgba(255,255,255,0.25);
    border-radius:12px; padding:12px 6px; text-align:center; cursor:pointer;
  }
  .level-card.locked { opacity:0.4; }
  .level-card.done { border-color:#ffd23f; background:rgba(255,210,63,0.15); }
  .level-card .num { font-size:20px; font-weight:bold; }
  .level-card .stars { font-size:13px; color:#ffd23f; min-height:16px; }
  .level-card .lock-icon { font-size:20px; }
  #level-select-back {
    margin-top:22px; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.4);
    color:#fff; padding:10px 26px; border-radius:10px; font-weight:bold; font-size:14px;
  }

  #msg { min-width:260px; }
  #msg .msg-buttons { display:flex; flex-direction:column; gap:8px; }
  #msg .msg-buttons button { width:100%; }
  #msg .btn-secondary { background:rgba(255,255,255,0.15) !important; color:#fff !important; border:2px solid rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div id="rotate-screen">
  <div class="icon">📱</div>
  <p>Bu oyun yatay modda oynanır.<br>Telefonunu çevir!</p>
</div>

<div id="start-screen">
  <h1>🐻 BLOK MACERA</h1>
  <p>Bloklu dünyada koş, zıpla, altınları topla!<br>Sol taraf: hareket joystick&apos;i • Sağ alt: zıpla butonu</p>
  <button id="start-btn">OYNA</button>
  <button id="level-select-btn">🗺️ BÖLÜM SEÇ</button>
</div>

<div id="level-select">
  <h1>🗺️ Bölüm Seç</h1>
  <div id="level-grid"></div>
  <button id="level-select-back">Geri</button>
</div>

<canvas id="game"></canvas>

<div id="hud">
  <div class="pill"><span class="coin-dot"></span><span id="coin-count">0</span></div>
  <div class="pill level-tag" id="level-tag">Bölüm 1</div>
  <div class="pill"><span class="heart">❤️</span><span id="life-count">3</span></div>
</div>

<div id="joystick-zone">
  <div id="stick-base"><div id="stick-knob"></div></div>
</div>
<div id="jump-btn">ZIPLA</div>

<div id="msg">
  <h2 id="msg-title"></h2>
  <p id="msg-text"></p>
  <div class="msg-buttons">
    <button id="msg-retry-btn">🔁 Tekrar Dene</button>
    <button id="msg-next-btn">➡️ Sonraki Bölüm</button>
    <button id="msg-select-btn" class="btn-secondary">🗺️ Bölüm Seç</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

// ---------- Sabitler ----------
const TILE = 40;
const GRAVITY = 0.9;
const MOVE_SPEED = 4.2;
const JUMP_FORCE = -16;
const LEVEL_LENGTH = 60;       // bölüm başına kolon sayısı
const TOTAL_LEVELS = 10;
const LEVEL_STORAGE_KEY = 'blokMacera_progress_v1';

// Blok tipleri: 0 boş, 1 çim, 2 toprak, 3 taş, 4 altın bloğu(görsel), 5 tehlike(lav)
const COLORS = {
  1: { top:'#5fd15a', side:'#8a5a2e' },
  2: { top:'#8a5a2e', side:'#6b4423' },
  3: { top:'#9a9a9a', side:'#6f6f6f' },
  5: { top:'#ff5522', side:'#c23c10' }
};

// ---------- Dünya üretimi (seed'e bağlı, sonlu bölümler) ----------
let columns = []; // {groundY, isPit, hasHazard, coinY, floatY}
let seedRand = 0;
let currentLevel = 1;
let monsters = [];       // [{cx, baseX, range, x, dir, speed, alive, w, h}]
let flagCol = null;      // bayrak/prenses kolonu
let levelEndReached = false;

function pseudo(x){
  const s = Math.sin(x*0.15 + seedRand)*43758.5453;
  return s - Math.floor(s);
}

function seedForLevel(lvl){
  // her bölüm için sabit ama farklı bir seed
  return lvl * 137.531;
}

function genColumn(cx){
  const base = 8;
  const wobble = Math.floor(Math.sin(cx*0.08)*2.2 + Math.sin(cx*0.23)*1.3);
  let groundY = base + wobble;
  // occasional pit
  let isPit = pseudo(cx*3.1) > 0.93 && cx > 6 && cx < LEVEL_LENGTH - 4;
  if (isPit) groundY = 999; // fake deep pit (handled as no ground)

  let hasHazard = !isPit && pseudo(cx*7.7) > 0.965 && cx > 10 && cx < LEVEL_LENGTH - 4;
  let hasCoin = pseudo(cx*5.3) > 0.72;
  let floatBlock = pseudo(cx*9.1) > 0.85 && cx > 5;

  return {
    cx, groundY, isPit, hasHazard,
    coinY: hasCoin ? groundY - (2 + Math.floor(pseudo(cx*11)*3)) : null,
    floatY: floatBlock ? groundY - 4 - Math.floor(pseudo(cx*13)*2) : null
  };
}

function getColumn(cx){
  if (cx < 0) cx = 0;
  if (cx > LEVEL_LENGTH) cx = LEVEL_LENGTH;
  if (!columns[cx]) columns[cx] = genColumn(cx);
  return columns[cx];
}

// ---------- Canavar üretimi ----------
function genMonsters(){
  monsters = [];
  const monsterChance = 0.4 + Math.min(currentLevel * 0.02, 0.3); // zorluk arttıkça daha çok canavar
  for (let cx = 8; cx < LEVEL_LENGTH - 6; cx++){
    const col = getColumn(cx);
    if (col.isPit || col.hasHazard) continue;
    if (pseudo(cx*17.3) > (1 - monsterChance * 0.06)){
      const range = 2 + Math.floor(pseudo(cx*19.1)*2); // gidip gelme aralığı (tile)
      monsters.push({
        cx, baseX: cx*TILE, range: range*TILE,
        x: cx*TILE, dir: 1,
        speed: 1.0 + Math.min(currentLevel * 0.05, 1.5),
        alive: true, w: 28, h: 26,
        groundY: col.groundY
      });
    }
  }
}

// ---------- Bölüm bitişi: bayrak + ESMA ----------
function setupFlag(){
  flagCol = LEVEL_LENGTH - 2;
  levelEndReached = false;
}

function updateMonsters(){
  for (const m of monsters){
    if (!m.alive) continue;
    m.x += m.dir * m.speed;
    if (m.x > m.baseX + m.range){ m.x = m.baseX + m.range; m.dir = -1; }
    if (m.x < m.baseX - m.range){ m.x = m.baseX - m.range; m.dir = 1; }
  }
}

function checkMonsterCollisions(){
  const pLeft = player.x, pRight = player.x + player.w;
  const pTop = player.y, pBottom = player.y + player.h;
  for (const m of monsters){
    if (!m.alive) continue;
    const mLeft = m.x, mRight = m.x + m.w;
    const mTop = m.groundY*TILE - m.h, mBottom = m.groundY*TILE;
    const overlapX = pRight > mLeft && pLeft < mRight;
    const overlapY = pBottom > mTop && pTop < mBottom;
    if (overlapX && overlapY){
      const playerWasAbove = (player.y + player.h - player.vy) <= mTop + 6;
      if (player.vy > 0 && playerWasAbove){
        // üstüne zıplayınca öldür
        m.alive = false;
        player.vy = JUMP_FORCE * 0.55;
      } else {
        loseLife();
        return;
      }
    }
  }
}

function checkFlag(){
  if (levelEndReached) return;
  const flagX = flagCol * TILE;
  if (player.x + player.w > flagX){
    levelEndReached = true;
    completeLevel();
  }
}

// ---------- Oyuncu ----------
let player = {
  x: 100, y: 0, vx:0, vy:0, w:26, h:34, onGround:false, facing:1, alive:true,
  fallStartTime: null
};
let camX = 0;
let camY = 0;
let coins = 0;
let lives = 3;
let collectedCoins = new Set();
let gameRunning = false;

function resetPlayer(){
  const startCol = getColumn(2);
  player.x = 2*TILE + 10;
  player.y = (startCol.groundY - 4) * TILE;
  player.vx = 0; player.vy = 0;
  player.alive = true;
  player.fallStartTime = null;
  camX = 0;
  camY = player.y - canvas.height*0.55;
  // can kaybında ölü canavarları tekrar canlandır (adil olsun diye)
  for (const m of monsters){ m.alive = true; m.x = m.baseX; m.dir = 1; }
}

// ---------- İlerleme (localStorage) ----------
function loadProgress(){
  try {
    const raw = localStorage.getItem(LEVEL_STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return { unlocked: 1, stars: {} }; // stars: {levelNum: 1-3}
}
function saveProgress(p){
  try { localStorage.setItem(LEVEL_STORAGE_KEY, JSON.stringify(p)); } catch(e){}
}
let progress = loadProgress();

function starsForLevel(coinsCollected, lifeLost){
  // basit yıldız hesabı: can kaybetmeden + çok altınla 3 yıldız
  if (lifeLost === 0 && coinsCollected >= 5) return 3;
  if (lifeLost <= 1) return 2;
  return 1;
}

// ---------- Input ----------
let keys = { left:false, right:false, jump:false };

const zone = document.getElementById('joystick-zone');
const base = document.getElementById('stick-base');
const knob = document.getElementById('stick-knob');
let stickActive = false, stickId = null, baseX=0, baseY=0;

function updateBaseCenter(){
  const r = base.getBoundingClientRect();
  baseX = r.left + r.width/2;
  baseY = r.top + r.height/2;
}
updateBaseCenter();
window.addEventListener('resize', updateBaseCenter);

function stickStart(id, cx, cy){
  stickActive = true; stickId = id;
  updateBaseCenter();
  knob.style.left='30px'; knob.style.top='30px';
}
function stickMove(cx, cy){
  if (!stickActive) return;
  let dx = cx-baseX, dy = cy-baseY;
  const max = 45;
  const dist = Math.min(Math.hypot(dx,dy), max);
  const ang = Math.atan2(dy,dx);
  const kx = Math.cos(ang)*dist, ky = Math.sin(ang)*dist;
  knob.style.left = (30+kx)+'px'; knob.style.top = (30+ky)+'px';
  keys.left = dx < -15;
  keys.right = dx > 15;
}
function stickEnd(){
  stickActive = false; stickId = null;
  knob.style.left='30px'; knob.style.top='30px';
  keys.left=false; keys.right=false;
}

zone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  stickStart(t.identifier, t.clientX, t.clientY);
}, {passive:false});
zone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for (const t of e.changedTouches) if (t.identifier===stickId) stickMove(t.clientX,t.clientY);
}, {passive:false});
zone.addEventListener('touchend', e=>{
  e.preventDefault();
  for (const t of e.changedTouches) if (t.identifier===stickId) stickEnd();
}, {passive:false});

// mouse fallback for desktop testing
zone.addEventListener('mousedown', e=>{ stickStart('m', e.clientX, e.clientY); });
window.addEventListener('mousemove', e=>{ if(stickId==='m') stickMove(e.clientX,e.clientY); });
window.addEventListener('mouseup', e=>{ if(stickId==='m') stickEnd(); });

const jumpBtn = document.getElementById('jump-btn');
function doJump(){ keys.jump = true; }
jumpBtn.addEventListener('touchstart', e=>{ e.preventDefault(); doJump(); }, {passive:false});
jumpBtn.addEventListener('mousedown', e=>{ doJump(); });

// keyboard fallback
window.addEventListener('keydown', e=>{
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=true;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=true;
  if (e.key===' '||e.key==='ArrowUp'||e.key==='w') keys.jump=true;
});
window.addEventListener('keyup', e=>{
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
});

// ---------- Collision helpers ----------
function isSolidAt(px, py){
  const cx = Math.floor(px / TILE);
  const col = getColumn(cx);
  const tileY = Math.floor(py / TILE);
  if (col.isPit) {
    if (col.floatY !== null && tileY === col.floatY) return 'block';
    return null;
  }
  if (tileY >= col.groundY) return 'ground';
  if (col.floatY !== null && tileY === col.floatY) return 'block';
  return null;
}
function isHazardAt(px, py){
  const cx = Math.floor(px/TILE);
  const col = getColumn(cx);
  if (col.hasHazard && !col.isPit){
    const tileY = Math.floor(py/TILE);
    if (tileY === col.groundY) return true;
  }
  return false;
}

// ---------- Oyun döngüsü ----------
function update(){
  if (!gameRunning) return;

  // yatay hareket
  if (keys.left){ player.vx = -MOVE_SPEED; player.facing=-1; }
  else if (keys.right){ player.vx = MOVE_SPEED; player.facing=1; }
  else player.vx *= 0.7;

  if (keys.jump && player.onGround){
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }
  keys.jump = false;

  player.vy += GRAVITY;
  if (player.vy > 20) player.vy = 20;

  // X hareketi + collision
  let nx = player.x + player.vx;
  const feetY = player.y + player.h - 2;
  const midY = player.y + player.h/2;
  const checkX = player.vx > 0 ? nx + player.w : nx;
  if (!isSolidAt(checkX, feetY) && !isSolidAt(checkX, midY)){
    player.x = nx;
  }

  // Y hareketi + collision
  let ny = player.y + player.vy;
  player.onGround = false;
  if (player.vy > 0){
    const checkFeet = ny + player.h;
    const solid = isSolidAt(player.x + player.w/2, checkFeet);
    if (solid){
      const cx = Math.floor((player.x+player.w/2)/TILE);
      const col = getColumn(cx);
      let landY;
      if (solid==='ground') landY = col.groundY*TILE;
      else landY = col.floatY*TILE;
      player.y = landY - player.h;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.y = ny;
    }
  } else if (player.vy < 0){
    const checkHead = ny;
    const solid = isSolidAt(player.x + player.w/2, checkHead);
    if (solid){
      player.vy = 0;
    } else {
      player.y = ny;
    }
  }

  // düşme (pit) -> 2 saniye içinde can kaybı
  const feetCol = getColumn(Math.floor((player.x+player.w/2)/TILE));
  const isFalling = feetCol.isPit && player.y > camY + canvas.height*0.3;
  if (isFalling){
    if (player.fallStartTime === null) player.fallStartTime = Date.now();
    else if (Date.now() - player.fallStartTime >= 2000){
      player.fallStartTime = null;
      loseLife();
    }
  } else {
    player.fallStartTime = null;
  }
  // güvenlik ağı: çok derine düşerse yine de öldür
  if (player.y > camY + canvas.height + 600){
    player.fallStartTime = null;
    loseLife();
  }

  // hazard check
  if (isHazardAt(player.x+player.w/2, player.y+player.h-2)){
    loseLife();
  }

  // canavar güncelleme + çarpışma
  updateMonsters();
  checkMonsterCollisions();
  if (!gameRunning) return; // loseLife oyunu bitirmiş olabilir

  // bayrak / bölüm bitişi
  checkFlag();
  if (!gameRunning) return;

  // coin toplama
  const cx = Math.floor((player.x+player.w/2)/TILE);
  const col = getColumn(cx);
  if (col.coinY !== null && !collectedCoins.has(cx)){
    const coinPixelY = col.coinY*TILE;
    if (Math.abs((player.y+player.h/2) - (coinPixelY+TILE/2)) < TILE && player.x+player.w > cx*TILE && player.x < cx*TILE+TILE){
      collectedCoins.add(cx);
      coins++;
      document.getElementById('coin-count').textContent = coins;
    }
  }

  camX = player.x - canvas.width*0.35;
  if (camX < 0) camX = 0;

  // dikey kamera: zemini her zaman ekranın alt kısmına yakın tut
  const targetCamY = player.y - canvas.height*0.55;
  camY += (targetCamY - camY) * 0.15;

  draw();
  requestAnimationFrame(update);
}

let livesLostThisLevel = 0;

function loseLife(){
  lives--;
  livesLostThisLevel++;
  document.getElementById('life-count').textContent = lives;
  if (lives <= 0){
    endGame(false);
  } else {
    resetPlayer();
  }
}

function endGame(win){
  gameRunning = false;
  const msg = document.getElementById('msg');
  document.getElementById('msg-title').textContent = win ? '🎉 Başardın!' : '💀 Oyun Bitti';
  document.getElementById('msg-text').textContent = win
    ? `Toplam ${coins} altın topladın!`
    : `${coins} altın toplayabildin. Tekrar dene!`;
  const nextBtn = document.getElementById('msg-next-btn');
  nextBtn.style.display = win ? 'block' : 'none';
  msg.style.display = 'block';
}

function completeLevel(){
  gameRunning = false;
  const stars = starsForLevel(coins, livesLostThisLevel);
  progress.unlocked = Math.max(progress.unlocked, Math.min(currentLevel + 1, TOTAL_LEVELS));
  progress.stars[currentLevel] = Math.max(progress.stars[currentLevel] || 0, stars);
  saveProgress(progress);

  const msg = document.getElementById('msg');
  document.getElementById('msg-title').textContent = '🎉 Prenses ESMA\'yı kurtardın!';
  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('msg-text').textContent =
    `Bölüm ${currentLevel} tamamlandı! ${coins} altın topladın. ${starStr}`;
  const nextBtn = document.getElementById('msg-next-btn');
  nextBtn.style.display = currentLevel < TOTAL_LEVELS ? 'block' : 'none';
  msg.style.display = 'block';
}

// ---------- Çizim ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // güneş
  ctx.save();
  ctx.fillStyle = 'rgba(255,244,200,0.9)';
  ctx.beginPath();
  ctx.arc(canvas.width*0.82, canvas.height*0.18, 34, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,244,200,0.35)';
  ctx.beginPath();
  ctx.arc(canvas.width*0.82, canvas.height*0.18, 50, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // bulutlar (paralaks, yavaş kayan)
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  for (let i=-1;i<8;i++){
    const cx0 = i*320 - (camX*0.15)%320;
    const cy0 = canvas.height*0.15 + (i%3)*30;
    drawCloud(cx0, cy0);
  }

  // uzak dağlar (paralaks)
  ctx.fillStyle = 'rgba(120,90,160,0.35)';
  for (let i=-2;i<20;i++){
    const bx = i*220 - (camX*0.3)%220;
    ctx.beginPath();
    ctx.moveTo(bx, canvas.height*0.55);
    ctx.lineTo(bx+110, canvas.height*0.3);
    ctx.lineTo(bx+220, canvas.height*0.55);
    ctx.fill();
  }
  // yakın tepeler (ikinci paralaks katmanı, biraz daha koyu)
  ctx.fillStyle = 'rgba(90,130,90,0.3)';
  for (let i=-2;i<20;i++){
    const bx = i*260 - (camX*0.5)%260;
    ctx.beginPath();
    ctx.moveTo(bx, canvas.height*0.62);
    ctx.quadraticCurveTo(bx+130, canvas.height*0.42, bx+260, canvas.height*0.62);
    ctx.fill();
  }

  const startCol = Math.floor(camX/TILE) - 1;
  const endCol = Math.min(startCol + Math.ceil(canvas.width/TILE) + 3, LEVEL_LENGTH);

  for (let cx=startCol; cx<=endCol; cx++){
    if (cx < 0) continue;
    const col = getColumn(cx);
    const sx = cx*TILE - camX;

    if (!col.isPit){
      // zemin blokları (birkaç kat aşağı görünsün)
      for (let ty=col.groundY; ty<col.groundY+8; ty++){
        const sy = ty*TILE - camY;
        if (sy > canvas.height+40) break;
        if (sy < -TILE) continue;
        drawBlock(sx, sy, ty===col.groundY ? 1 : 2);
      }
      if (col.hasHazard){
        // lav görünümü üstte parlasın
        ctx.fillStyle = '#ff7733';
        ctx.fillRect(sx, col.groundY*TILE-4-camY, TILE, 6);
      }
    }

    if (col.floatY !== null){
      drawBlock(sx, col.floatY*TILE - camY, 3);
    }

    if (col.coinY !== null && !collectedCoins.has(cx)){
      drawCoin(sx+TILE/2, col.coinY*TILE+TILE/2 - camY);
    }

    // bayrak + prenses ESMA
    if (flagCol !== null && cx === flagCol){
      drawFlagAndPrincess(sx, col.groundY*TILE - camY);
    }
  }

  // canavarlar
  for (const m of monsters){
    if (!m.alive) continue;
    drawMonster(m.x - camX, m.groundY*TILE - camY, m.dir);
  }

  // oyuncu (ayı)
  drawBear(player.x - camX, player.y - camY, player.facing);
}

function drawFlagAndPrincess(sx, groundSy){
  // bayrak direği
  const poleX = sx + TILE*0.5;
  const poleTopY = groundSy - TILE*4.2;
  ctx.strokeStyle = '#c9c9c9';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(poleX, groundSy);
  ctx.lineTo(poleX, poleTopY);
  ctx.stroke();
  // bayrak bezi (hafif dalgalanma)
  const t = Date.now()/300;
  const wave = Math.sin(t)*4;
  ctx.fillStyle = '#ff5d5d';
  ctx.beginPath();
  ctx.moveTo(poleX, poleTopY);
  ctx.lineTo(poleX+34+wave, poleTopY+10);
  ctx.lineTo(poleX, poleTopY+20);
  ctx.closePath();
  ctx.fill();

  // Prenses ESMA (Super Mario tarzı, bayrağın yanında bekliyor)
  const px = sx + TILE*1.6, py = groundSy - 46;
  ctx.save();
  ctx.translate(px, py);

  // gölge
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 31, 13, 3.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // elbise (gradyan)
  const dressGrad = ctx.createLinearGradient(0,-4,0,30);
  dressGrad.addColorStop(0, '#ffb3e6');
  dressGrad.addColorStop(1, '#ff6fc7');
  ctx.fillStyle = dressGrad;
  ctx.beginPath();
  ctx.moveTo(-13, 30);
  ctx.lineTo(13, 30);
  ctx.lineTo(9, -4);
  ctx.lineTo(-9, -4);
  ctx.closePath();
  ctx.fill();
  // elbise kenar detayı
  ctx.strokeStyle = '#e854ad';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-13,30); ctx.lineTo(13,30);
  ctx.stroke();
  // kafa
  ctx.fillStyle = '#ffd9b3';
  ctx.beginPath();
  ctx.arc(0, -14, 11, 0, Math.PI*2);
  ctx.fill();
  // saç
  ctx.fillStyle = '#7a3b1e';
  ctx.beginPath();
  ctx.arc(0, -18, 12, Math.PI*0.95, Math.PI*2.05);
  ctx.fill();
  ctx.fillRect(-12, -18, 4, 20);
  ctx.fillRect(8, -18, 4, 20);
  // taç
  ctx.fillStyle = '#ffd23f';
  ctx.beginPath();
  ctx.moveTo(-8,-24); ctx.lineTo(-8,-30); ctx.lineTo(-4,-25);
  ctx.lineTo(0,-31); ctx.lineTo(4,-25); ctx.lineTo(8,-30);
  ctx.lineTo(8,-24); ctx.closePath();
  ctx.fill();
  // gözler
  ctx.fillStyle = '#2a1808';
  ctx.beginPath();
  ctx.arc(-4,-14,1.4,0,Math.PI*2);
  ctx.arc(4,-14,1.4,0,Math.PI*2);
  ctx.fill();
  // gülümseme
  ctx.strokeStyle = '#a15c3a'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(0,-11,3,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
  ctx.restore();

  // isim etiketi
  ctx.font = 'bold 13px Trebuchet MS, Arial';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 3;
  ctx.textAlign = 'center';
  ctx.strokeText('ESMA', px, py - 42);
  ctx.fillText('ESMA', px, py - 42);
  ctx.textAlign = 'left';
}

function drawMonster(sx, groundSy, dir){
  const t = Date.now()/150;
  const footSwing = Math.sin(t)*3;

  ctx.save();
  ctx.translate(sx+14, groundSy-13);
  ctx.scale(dir, 1);

  // gölge
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 15, 13, 3.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ayaklar (hareketli)
  ctx.fillStyle = '#4a2270';
  ctx.beginPath();
  ctx.ellipse(-7+footSwing, 11, 5, 4, 0, 0, Math.PI*2);
  ctx.ellipse(7-footSwing, 11, 5, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // gövde (mor mantar-canavar, gradyan)
  const grad = ctx.createRadialGradient(-4,-3,2, 0,2,16);
  grad.addColorStop(0, '#9d5fd0');
  grad.addColorStop(1, '#7a3fb0');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 2, 14, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // sırt benekleri (mantar dokusu)
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.arc(-6,-4,2.2,0,Math.PI*2);
  ctx.arc(4,-7,1.6,0,Math.PI*2);
  ctx.arc(8,1,1.8,0,Math.PI*2);
  ctx.fill();

  // alt gölgelendirme
  ctx.fillStyle = '#5a2a85';
  ctx.beginPath();
  ctx.ellipse(0, 8, 12, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // gözler (kızgın, parlaklıklı)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(5,-2,4,0,Math.PI*2);
  ctx.arc(-3,-4,3,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#c0202a';
  ctx.beginPath();
  ctx.arc(6,-2,1.8,0,Math.PI*2);
  ctx.arc(-3,-4,1.4,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(6.6,-2.6,0.6,0,Math.PI*2);
  ctx.fill();

  // kaşlar (öfkeli)
  ctx.strokeStyle = '#3a1a55'; ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(1,-9); ctx.lineTo(9,-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-7,-8); ctx.lineTo(-1,-7); ctx.stroke();

  // ağız (dişli)
  ctx.fillStyle = '#3a1a55';
  ctx.beginPath();
  ctx.moveTo(-4,6); ctx.lineTo(6,6); ctx.lineTo(4,10); ctx.lineTo(-2,10);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(-2,6); ctx.lineTo(0,9); ctx.lineTo(2,6); ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawCloud(cx, cy){
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI*2);
  ctx.arc(cx+20, cy-8, 14, 0, Math.PI*2);
  ctx.arc(cx+38, cy, 18, 0, Math.PI*2);
  ctx.arc(cx+20, cy+6, 16, 0, Math.PI*2);
  ctx.fill();
}

function drawBlock(sx, sy, type){
  const c = COLORS[type];
  // üst kısım (çim/kar/kaya yüzeyi)
  const topGrad = ctx.createLinearGradient(sx, sy, sx, sy+TILE*0.28);
  topGrad.addColorStop(0, lighten(c.top, 18));
  topGrad.addColorStop(1, c.top);
  ctx.fillStyle = topGrad;
  ctx.fillRect(sx, sy, TILE, TILE*0.28);

  // alt kısım (toprak/taş gövdesi)
  const sideGrad = ctx.createLinearGradient(sx, sy+TILE*0.28, sx, sy+TILE);
  sideGrad.addColorStop(0, c.side);
  sideGrad.addColorStop(1, darken(c.side, 12));
  ctx.fillStyle = sideGrad;
  ctx.fillRect(sx, sy+TILE*0.28, TILE, TILE*0.72);

  // doku noktaları (toprak/taş benekleri)
  if (type === 2 || type === 3){
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    const seed = Math.floor(sx*0.13 + sy*0.07);
    for (let i=0;i<3;i++){
      const dx = ((seed*31+i*17)%TILE);
      const dy = TILE*0.4 + ((seed*13+i*29)%(TILE*0.5));
      ctx.beginPath();
      ctx.arc(sx+dx, sy+dy, 1.6, 0, Math.PI*2);
      ctx.fill();
    }
  }
  // çim üstünde küçük ot detayları
  if (type === 1){
    ctx.strokeStyle = darken(c.top, 20);
    ctx.lineWidth = 1;
    for (let i=0;i<4;i++){
      const gx = sx + 4 + i*9;
      ctx.beginPath();
      ctx.moveTo(gx, sy+2);
      ctx.lineTo(gx-1, sy-2);
      ctx.stroke();
    }
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(sx, sy, TILE, TILE);
}

function lighten(hex, amt){
  const c = parseInt(hex.slice(1),16);
  let r = Math.min(255, ((c>>16)&255)+amt);
  let g = Math.min(255, ((c>>8)&255)+amt);
  let b = Math.min(255, (c&255)+amt);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt){
  const c = parseInt(hex.slice(1),16);
  let r = Math.max(0, ((c>>16)&255)-amt);
  let g = Math.max(0, ((c>>8)&255)-amt);
  let b = Math.max(0, (c&255)-amt);
  return `rgb(${r},${g},${b})`;
}

function drawCoin(cx, cy){
  const t = Date.now()/300;
  const bounce = Math.sin(Date.now()/250)*2;
  const scaleX = Math.abs(Math.cos(t));
  ctx.save();
  ctx.translate(cx, cy + bounce);
  ctx.scale(scaleX, 1);
  // dış halka
  const grad = ctx.createRadialGradient(-3,-3,1, 0,0,11);
  grad.addColorStop(0, '#fff3b0');
  grad.addColorStop(0.5, '#ffd23f');
  grad.addColorStop(1, '#e0a800');
  ctx.beginPath();
  ctx.arc(0,0,11,0,Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#b8860b';
  ctx.lineWidth = 2;
  ctx.stroke();
  // iç detay (yıldız/para simgesi)
  ctx.fillStyle = '#b8860b';
  ctx.font = 'bold 12px Trebuchet MS, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('★', 0, 0.5);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawBear(x, y, facing){
  const t = Date.now()/120;
  const walking = Math.abs(player.vx) > 0.3 && player.onGround;
  const legSwing = walking ? Math.sin(t)*7 : 0;
  const armSwing = walking ? Math.sin(t+Math.PI)*5 : 0;
  const bob = walking ? Math.abs(Math.sin(t))*1.5 : 0;

  ctx.save();
  ctx.translate(x + player.w/2, y + player.h/2 + bob);
  ctx.scale(facing, 1);

  // ---- gölge ----
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 25 - bob, 14, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ---- arka bacak (uzakta, önce çizilir) ----
  ctx.fillStyle = '#6e441f';
  ctx.beginPath();
  ctx.ellipse(-5 + legSwing*0.4, 17, 5.5, 7, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#5a3717';
  ctx.beginPath();
  ctx.ellipse(-5 + legSwing*0.4, 23, 6, 3.4, 0, 0, Math.PI*2);
  ctx.fill();

  // ---- arka kol (uzakta) ----
  ctx.fillStyle = '#6e441f';
  ctx.beginPath();
  ctx.ellipse(-9 - armSwing*0.3, 0, 4.5, 9, -0.2, 0, Math.PI*2);
  ctx.fill();

  // ---- kuyruk küçük ----
  ctx.fillStyle = '#c98a4b';
  ctx.beginPath();
  ctx.arc(-12, 5, 3, 0, Math.PI*2);
  ctx.fill();

  // ---- gövde ----
  const bodyGrad = ctx.createRadialGradient(-3,-2,2, 0,4,17);
  bodyGrad.addColorStop(0, '#a9723f');
  bodyGrad.addColorStop(1, '#8B5A2B');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 4, 13, 15, 0, 0, Math.PI*2);
  ctx.fill();
  // karın (açık ton)
  ctx.fillStyle = '#d9a86b';
  ctx.beginPath();
  ctx.ellipse(2, 8, 7, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // ---- ön bacak (yakında) ----
  ctx.fillStyle = '#8B5A2B';
  ctx.beginPath();
  ctx.ellipse(5 - legSwing*0.4, 17, 6, 7.5, 0, 0, Math.PI*2);
  ctx.fill();
  // patiler (taban)
  ctx.fillStyle = '#5a3717';
  ctx.beginPath();
  ctx.ellipse(5 - legSwing*0.4, 23.5, 6.6, 3.8, 0, 0, Math.PI*2);
  ctx.fill();
  // pati pedleri (küçük noktalar)
  ctx.fillStyle = '#3d2510';
  ctx.beginPath();
  ctx.arc(2 - legSwing*0.4, 24, 1, 0, Math.PI*2);
  ctx.arc(5 - legSwing*0.4, 25, 1, 0, Math.PI*2);
  ctx.arc(8 - legSwing*0.4, 24, 1, 0, Math.PI*2);
  ctx.fill();

  // ---- kafa ----
  const headGrad = ctx.createRadialGradient(4,-17,2, 6,-14,11);
  headGrad.addColorStop(0, '#a9723f');
  headGrad.addColorStop(1, '#8B5A2B');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.arc(6, -14, 10, 0, Math.PI*2);
  ctx.fill();

  // kulaklar (dış + iç)
  ctx.fillStyle = '#8B5A2B';
  ctx.beginPath();
  ctx.arc(0,-22,4.3,0,Math.PI*2);
  ctx.arc(12,-22,4.3,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#c98a4b';
  ctx.beginPath();
  ctx.arc(0,-22,2.2,0,Math.PI*2);
  ctx.arc(12,-22,2.2,0,Math.PI*2);
  ctx.fill();

  // yüz (açık kısım / burun bölgesi)
  ctx.fillStyle = '#e0b27e';
  ctx.beginPath();
  ctx.ellipse(9,-10,6,5.5,0,0,Math.PI*2);
  ctx.fill();

  // göz (parlaklıklı)
  ctx.fillStyle = '#2a1808';
  ctx.beginPath();
  ctx.arc(11,-16,1.8,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(11.6,-16.6,0.6,0,Math.PI*2);
  ctx.fill();

  // burun
  ctx.fillStyle = '#2a1808';
  ctx.beginPath();
  ctx.ellipse(13,-9,2.4,1.8,0,0,Math.PI*2);
  ctx.fill();
  // ağız
  ctx.strokeStyle = '#5a3717';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(13,-7);
  ctx.lineTo(13,-5.5);
  ctx.moveTo(13,-5.5); ctx.lineTo(10.5,-4.5);
  ctx.moveTo(13,-5.5); ctx.lineTo(15,-4.8);
  ctx.stroke();

  // ---- ön kol (yakında) ----
  ctx.fillStyle = '#a9723f';
  ctx.beginPath();
  ctx.ellipse(9 + armSwing*0.3, 0, 5, 9.5, 0.15, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#c98a4b';
  ctx.beginPath();
  ctx.arc(10 + armSwing*0.3, 8, 3.4, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ---------- Başlat ----------
document.getElementById('start-btn').addEventListener('click', ()=> startLevel(progress.unlocked || 1));
document.getElementById('level-select-btn').addEventListener('click', openLevelSelect);
document.getElementById('level-select-back').addEventListener('click', ()=>{
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
});
document.getElementById('msg-retry-btn').addEventListener('click', ()=> startLevel(currentLevel));
document.getElementById('msg-next-btn').addEventListener('click', ()=> startLevel(Math.min(currentLevel+1, TOTAL_LEVELS)));
document.getElementById('msg-select-btn').addEventListener('click', ()=>{
  document.getElementById('msg').style.display = 'none';
  openLevelSelect();
});

function openLevelSelect(){
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('msg').style.display = 'none';
  renderLevelGrid();
  document.getElementById('level-select').style.display = 'flex';
}

function renderLevelGrid(){
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  for (let i=1; i<=TOTAL_LEVELS; i++){
    const locked = i > progress.unlocked;
    const done = !!progress.stars[i];
    const card = document.createElement('div');
    card.className = 'level-card' + (locked ? ' locked' : '') + (done ? ' done' : '');
    const starCount = progress.stars[i] || 0;
    card.innerHTML = locked
      ? `<div class="lock-icon">🔒</div><div class="num">${i}</div>`
      : `<div class="num">${i}</div><div class="stars">${'⭐'.repeat(starCount)}${'☆'.repeat(3-starCount)}</div>`;
    if (!locked){
      card.addEventListener('click', ()=> startLevel(i));
    }
    grid.appendChild(card);
  }
}

function startLevel(levelNum){
  currentLevel = levelNum;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('msg').style.display = 'none';
  document.getElementById('level-tag').textContent = 'Bölüm ' + currentLevel;

  columns = [];
  collectedCoins = new Set();
  coins = 0; lives = 3; livesLostThisLevel = 0;
  document.getElementById('coin-count').textContent = coins;
  document.getElementById('life-count').textContent = lives;
  seedRand = seedForLevel(currentLevel);

  genMonsters();
  setupFlag();
  resetPlayer();
  gameRunning = true;
  requestAnimationFrame(update);
}
